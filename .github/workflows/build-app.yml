# .github/workflows/build-app.yml
name: Build Merchant App

on:
  repository_dispatch:
    types: [build-whitelabel]



jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.test.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        id: test
        run: |
          set +e
          output=$(bun test 2>&1)
          exit_code=$?
          if echo "$output" | grep -q "No tests found"; then
            echo "result=skipped" >> $GITHUB_OUTPUT
            echo "$output"
            exit 0
          fi
          echo "result=$([ $exit_code -eq 0 ] && echo passed || echo failed)" >> $GITHUB_OUTPUT
          echo "$output"
          exit $exit_code

  build:
    name: Build & Submit (${{ github.event.client_payload.merchant_slug }})
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate Tenant Slug
        run: |
          if [ -z "${{ github.event.client_payload.tenantSlug }}" ]; then
            echo "::error::tenantSlug is required in client_payload"
            exit 1
          fi

      - name: Fetch Tenant Assets
        run: |
          TENANT_SLUG="${{ github.event.client_payload.tenantSlug }}"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.INTERNAL_API_TOKEN }}" \
            "${{ secrets.RURALPAY_BACKEND_API }}/admin/tenant/$TENANT_SLUG/assets" \
            -o assets.zip
          unzip -o assets.zip -d "./assets/$TENANT_SLUG"

      - name: Build & Submit
        run: eas build --platform all --profile production --non-interactive --auto-submit
